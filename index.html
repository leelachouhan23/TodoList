<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: Arial, sans-serif;
    }

    .ToDoclass{
        background: linear-gradient(135deg, #ffffff, #f3f4f6);
        padding-top: 0px;
        text-align: center;
        min-height: 200px;
        width: 400px;
        padding-bottom: 20px;
        display: flex;
        justify-content: flex-start;
        flex-direction: column;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .ToDoclass h1{
        color: #4b0082;
        margin-top: 30px;
    }

    .ToDoclass input{
        width: 300px;
        height: 30px;
        border-radius: 8px;
        border: 2px solid #667eea;
        padding-left: 10px;
        outline: none;
    }

    .ToDoclass input:focus{
        border-color: #764ba2;
        box-shadow: 0 0 5px #764ba2;
    }

    .ToDoclass button{
        height: 35px;
        width: 50px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .ToDoclass button:hover{
        background: linear-gradient(135deg, #764ba2, #667eea);
        transform: scale(1.05);
    }
    #taskList{
        list-style: none;
        padding: 0;
        margin-top: 15px;
        width: 100%;
    }
    .taskItem{
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 8px 15px;
        padding: 8px;
        background: #ffffff;
        border-radius: 8px;
        box-shadow:  0 5px 10px rgba(0,0,0,0.1);
        gap: 8px;
    }
   .taskItem span{
    flex: 1;              /* Automatically takes available space */
    text-align: left;
    padding-left: 8px;
}
    .taskItem button{
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }
    @keyframes fadeSlideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.taskItem {
    animation: fadeSlideIn 0.3s ease-in-out;
}
</style>
<body>
    <div class="ToDoclass">
        <h1>ToDo List</h1>
          <form action="">
            <input type="search" placeholder="Add a new task">
            <button>Add</button>
        </form>
        <ul id="taskList">
        </ul>
    
    </div>
</body>
<script>
    const form = document.querySelector("form");
    const input =document.querySelector("input");
    const taskList = document.getElementById("taskList");

    form.addEventListener("submit", function(e){
        e.preventDefault();

        const taskValue = input.value.trim();

        if(taskValue === ""){
            alert("Please enter a task");
            return;
        }
        
        const li = document.createElement("li");
        li.classList.add("taskItem");

        const span = document.createElement("span");
        span.textContent = taskValue;

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.style.background = "#ffa500"
        
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";

        deleteBtn.addEventListener("click", function(){
            li.remove();
        });
        editBtn.addEventListener("click", function(){
            if(editBtn.textContent === "Edit"){
                const editInput = document.createElement("input");
                editInput.type = "text";
                editInput.value = span.textContent;
                

                li.replaceChild(editInput, span);
                editBtn.textContent = "Save";
            }
            else{
                const editInput = li.querySelector("input");
                const newSpan = document.createElement("span");
                newSpan.textContent = editInput.value;

                li.replaceChild(newSpan, editInput);
                editBtn.textContent = "Edit";
                editBtn.style.marginRight = "10px";
            }
        })
        
        li.appendChild(span);
        li.appendChild(editBtn);
        li.appendChild(deleteBtn);

        taskList.appendChild(li);

        input.value = "";
    })
</script>
</html>
